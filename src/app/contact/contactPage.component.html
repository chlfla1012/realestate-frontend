<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | ラクイエクラウド</title>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <img src="assets/logo.png" routerLink="/LP" alt="RAKUIE CLOUD" class="logo">

      <nav class="nav-links">
        <a routerLink="/LP">HOME</a>
        <a routerLink="/contact">問い合わせ</a>
        <button routerLink="/login">ログイン</button>
      </nav>

      <button class="menu-toggle" (click)="toggleMenu()">☰</button>
    </div>

    <div class="mobile-menu" [class.active]="menuOpen">
      <a routerLink="/LP" (click)="closeMenu()">HOME</a>
      <a routerLink="/contact" (click)="closeMenu()">問い合わせ</a>
      <button routerLink="/login" (click)="closeMenu()">ログイン</button>
    </div>
  </header>
  <section class="contact-fullscreen-section">
    <div class="contact-visual fade-in-on-load">
      <img src="assets/lp_contact.png" alt="お問い合わせイメージ" />
    </div>

    <div class="contact-form-area fade-in-on-load">
      <h2 class="contact-heading">お問い合わせ</h2>
      <p class="contact-sub">ご不明な点がございましたら、以下のフォームよりご連絡ください。</p>

      <form class="contact-form">
        <label>会社名 <span class="required">*</span></label>
        <input type="text" placeholder="例：ラクイエ株式会社" required>

        <label>お名前 <span class="required">*</span></label>
        <input type="text" placeholder="例：山田 太郎" required>

        <label>メールアドレス <span class="required">*</span></label>
        <input type="email" placeholder="例：example@domain.com" required>

        <label>お問い合わせ内容 <span class="required">*</span></label>
        <textarea rows="4" placeholder="ご質問やご要望をご記入ください" required></textarea>

        <button type="submit" routerLink="/LP">送信する</button>
      </form>
    </div>
  </section>

</body>
</html>
